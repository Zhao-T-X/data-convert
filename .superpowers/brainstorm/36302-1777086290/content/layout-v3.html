<h2>DataConvert - 数据转换</h2>
<p class="subtitle">选择输出格式</p>

<style>
  .format-list { display: flex; flex-direction: column; gap: 8px; }
  .format-item {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 20px; background: #fff;
    border: 1px solid #e8e8e8; border-radius: 12px;
    cursor: pointer; transition: all 0.2s;
  }
  .format-item:hover { border-color: #8bc34a; background: #fafdff; }
  .format-item.selected { border-color: #8bc34a; background: #f6f9f2; }
  .format-item .icon { 
    width: 44px; height: 44px; border-radius: 10px;
    background: #f5f5f5; display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 700; color: #666;
  }
  .format-item.selected .icon { background: #8bc34a; color: #fff; }
  .format-item .info { flex: 1; }
  .format-item .name { font-weight: 600; font-size: 15px; color: #222; }
  .format-item .desc { font-size: 13px; color: #888; margin-top: 2px; }
  .format-item .arrow { color: #ccc; }
  
  .dropzone {
    border: 2px dashed #d0d0d0; border-radius: 12px; padding: 32px;
    text-align: center; background: #fafafa; margin-top: 20px;
    transition: all 0.2s;
  }
  .dropzone:hover { border-color: #8bc34a; background: #f6f9f2; }
  .dropzone .icon { font-size: 36px; margin-bottom: 8px; }
  .dropzone .text { color: #666; font-size: 14px; }
  .dropzone .hint { font-size: 12px; color: #aaa; margin-top: 4px; }
</style>

<div class="dropzone">
  <div class="icon">📥</div>
  <div class="text">点击粘贴 / 拖入文件到这里</div>
  <div class="hint">.xlsx .xls .csv .json</div>
</div>

<div class="section" style="margin-top: 20px;">
  <div class="format-list">
    <div class="format-item selected" onclick="toggleSelect(this)">
      <div class="icon">{ }</div>
      <div class="info">
        <div class="name">JSON</div>
        <div class="desc">数组对象格式，API 开发常用</div>
      </div>
      <div class="arrow">→</div>
    </div>
    <div class="format-item" onclick="toggleSelect(this)">
      <div class="icon">SQL</div>
      <div class="info">
        <div class="name">SQL</div>
        <div class="desc">INSERT 语句，数据库导入</div>
      </div>
      <div class="arrow">→</div>
    </div>
    <div class="format-item" onclick="toggleSelect(this)">
      <div class="icon">CSV</div>
      <div class="info">
        <div class="name">CSV</div>
        <div class="desc">逗号分隔，Excel 兼容</div>
      </div>
      <div class="arrow">→</div>
    </div>
    <div class="format-item" onclick="toggleSelect(this)">
      <div class="icon">YML</div>
      <div class="info">
        <div class="name">YAML</div>
        <div class="desc">配置文件格式</div>
      </div>
      <div class="arrow">→</div>
    </div>
  </div>
</div>

<div style="margin-top: 20px; padding: 16px; background: #1a1a2e; border-radius: 10px;">
  <div style="color: #888; font-size: 12px; margin-bottom: 8px;">输出预览</div>
  <pre style="color: #4fc3f7; font-size: 12px; margin: 0; white-space: pre-wrap;">
[
  { "id": 1, "name": "Alice", "value": 100 },
  { "id": 2, "name": "Bob", "value": 200 }
]</pre>
</div>
