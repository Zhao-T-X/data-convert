<h2>DataConvert - 数据转换</h2>
<p class="subtitle">选择一个目标格式开始转换</p>

<style>
  .format-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
  .format-card { 
    background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 20px; 
    cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .format-card:hover { border-color: #4CAF50; box-shadow: 0 4px 12px rgba(76,175,80,0.15); }
  .format-card.selected { border-color: #4CAF50; background: #f5f9f5; }
  .format-card .icon { font-size: 32px; margin-bottom: 8px; }
  .format-card .name { font-weight: 600; font-size: 16px; color: #333; }
  .format-card .desc { font-size: 12px; color: #888; margin-top: 4px; }
  
  .dropzone {
    border: 2px dashed #e0e0e0; border-radius: 16px; padding: 40px 20px;
    text-align: center; background: #fafafa; transition: all 0.2s;
  }
  .dropzone:hover, .dropzone.dragover { border-color: #4CAF50; background: #f5f9f5; }
  .dropzone .icon { font-size: 48px; margin-bottom: 12px; }
  .dropzone .text { color: #666; }
  .dropzone .formats { font-size: 12px; color: #999; margin-top: 8px; }
</style>

<div class="dropzone" id="dropzone">
  <div class="icon">📋</div>
  <div class="text">粘贴数据或拖入文件到这里</div>
  <div class="formats">支持 .xlsx .xls .csv .json</div>
</div>

<div class="section" style="margin-top: 24px;">
  <h3>输出格式</h3>
  <div class="format-grid">
    <div class="format-card selected" onclick="toggleSelect(this)">
      <div class="icon">{ }</div>
      <div class="name">JSON</div>
      <div class="desc">API / 配置文件</div>
    </div>
    <div class="format-card" onclick="toggleSelect(this)">
      <div class="icon">🗄️</div>
      <div class="name">SQL</div>
      <div class="desc">INSERT 语句</div>
    </div>
    <div class="format-card" onclick="toggleSelect(this)">
      <div class="icon">📊</div>
      <div class="name">CSV</div>
      <div class="desc">Excel 导入</div>
    </div>
    <div class="format-card" onclick="toggleSelect(this)">
      <div class="icon">📝</div>
      <div class="name">YAML</div>
      <div class="desc">配置文件</div>
    </div>
  </div>
</div>
