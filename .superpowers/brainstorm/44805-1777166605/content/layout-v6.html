<style>
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 20px; background: #fff; }
  .box {
    border: 2px dashed #ddd; border-radius: 8px; padding: 40px;
    text-align: center; color: #888; margin-bottom: 16px;
  }
  .btns { display: flex; gap: 8px; }
  .btn {
    flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 6px;
    background: #fafafa; cursor: pointer; font-size: 14px;
  }
  .btn.on { background: #4CAF50; color: #fff; border-color: #4CAF50; }
  pre { background: #1a1a2e; color: #4fc3f7; padding: 16px; border-radius: 8px; font-size: 12px; }
  .copy { width: 100%; padding: 14px; background: #4CAF50; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
</style>

<p style="color:#333; margin-bottom:12px">📋 粘贴数据或拖入文件 → 选择格式 → 复制</p>

<div class="box">点击粘贴或拖入文件</div>

<div class="btns">
  <div class="btn on" onclick="this.parentElement.querySelectorAll('.btn').forEach(b=>b.classList.remove('on'));this.classList.add('on')">JSON</div>
  <div class="btn" onclick="this.parentElement.querySelectorAll('.btn').forEach(b=>b.classList.remove('on'));this.classList.add('on')">SQL</div>
  <div class="btn" onclick="this.parentElement.querySelectorAll('.btn').forEach(b=>b.classList.remove('on'));this.classList.add('on')">CSV</div>
  <div class="btn" onclick="this.parentElement.querySelectorAll('.btn').forEach(b=>b.classList.remove('on'));this.classList.add('on')">YAML</div>
</div>

<pre style="margin-top:16px">[
  {"id": 1, "name": "Alice"},
  {"id": 2, "name": "Bob"}
]</pre>

<button class="copy">📋 复制结果</button>
